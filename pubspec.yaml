name: atrio
description: "Atrio - Marketplace Premium de Espacios, Experiencias y Servicios"
publish_to: 'none'
version: 1.1.5+9

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: any
  riverpod_annotation: any

  # Navigation
  go_router: any

  # Supabase
  supabase_flutter: any

  # UI
  cached_network_image: any
  google_fonts: any

  # Date/Time
  table_calendar: any
  intl: any

  # Media
  image_picker: any
  flutter_image_compress: any

  # Maps & Location
  google_maps_flutter: any
  geolocator: any
  geocoding: any

  # Charts
  fl_chart: any

  # Local Storage
  shared_preferences: any
  hive: any
  hive_flutter: any

  # Connectivity
  connectivity_plus: any

  # Push notifications (Firebase Cloud Messaging + local display)
  firebase_core: any
  firebase_messaging: any
  flutter_local_notifications: any

  # Sharing
  share_plus: any

  # Payments
  http: any
  webview_flutter: any

  # Environment
  flutter_dotenv: any

  # Serialization
  freezed_annotation: any
  json_annotation: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: any

  # Code Generation
  build_runner: any
  riverpod_generator: any
  freezed: any
  json_serializable: any

  # App Icon Generation
  flutter_launcher_icons: any

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#D4FF00"
  adaptive_icon_foreground: "assets/images/logo_blanco.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
